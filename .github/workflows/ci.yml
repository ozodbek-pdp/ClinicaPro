name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite + server bundle)
        run: npm run build

      - name: Start server (background)
        run: |
          # start the bundled production server in background
          node dist/server.cjs > server.log 2>&1 & echo $! > server.pid
          # wait for health endpoint
          for i in $(seq 1 30); do
            if curl -sSf http://localhost:3000/api/health >/dev/null; then
              echo "Server is up"; break
            fi
            sleep 1
          done

      - name: Run integration tests
        run: node tests/run-tests.mjs

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi