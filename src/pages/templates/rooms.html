<div class="p-4 sm:p-8 space-y-8 animate-[fadeIn_0.4s_ease-out]">
  <!-- Header Card -->
  <div class="bg-white dark:bg-[#121826] rounded-3xl p-8 border border-slate-200/60 dark:border-slate-800 shadow-sm relative overflow-hidden flex flex-col md:flex-row md:items-center justify-between gap-6 shrink-0">
    <div class="absolute -right-20 -bottom-20 w-80 h-80 bg-teal-500/5 rounded-full blur-[80px] pointer-events-none"></div>
    <div class="relative z-10 space-y-1.5">
      <h1 class="text-3xl font-extrabold text-[#111827] dark:text-white tracking-tight">Klinika Xonalari Boshqaruvi</h1>
      <p class="text-slate-500 dark:text-slate-400 font-bold text-xs max-w-xl">Xonalarni tizimga kiritish, xonalar ixtisosligi va ularga biriktirilgan mas'ul shifokorlar bandligi monitoringi.</p>
    </div>
    <button id="add-room-btn" class="inline-flex items-center gap-2.5 px-6 py-4 bg-teal-600 hover:bg-teal-700 text-white font-extrabold text-xs uppercase tracking-wider rounded-2xl transition-all shadow-md shadow-teal-650/15 group shrink-0 select-none cursor-pointer">
       Yangi Xona Qo'shish
       <svg xmlns="http://www.w3.org/2500/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" class="group-hover:rotate-90 transition-transform"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <!-- Search and Actions Bar -->
  <div class="flex flex-col sm:flex-row gap-4 justify-between items-center bg-white dark:bg-[#121826] p-4 rounded-3xl border border-slate-200/60 dark:border-slate-800 shadow-xs">
    <div class="relative w-full sm:max-w-md group">
      <input type="search" id="room-search" placeholder="Xona raqami yoki ixtisosini kiriting..." class="input-premium input-icon-left !py-3.5" autocomplete="off" autocorrect="off" spellcheck="false">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-teal-600 transition-colors"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    </div>
    <div class="flex items-center gap-2.5 text-xs text-slate-500 font-bold shrink-0">
      <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
      Tizimda xonalar ro'yxati barqaror ravishda monitoring qilinmoqda
    </div>
  </div>

  <!-- Rooms View List -->
  <div class="bg-white dark:bg-[#121826] border border-slate-200/60 dark:border-slate-800 rounded-3xl overflow-hidden shadow-xs">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-slate-50/70 border-b border-slate-101/40 dark:border-slate-800 text-[10px] font-black text-slate-450 dark:text-slate-500 uppercase tracking-widest">
            <th class="p-5.5 font-bold">Xona Raqami</th>
            <th class="p-5.5 font-bold">Mutaxassislik Ixtisosi</th>
            <th class="p-5.5 font-bold">Bandlik Holati</th>
            <th class="p-5.5 font-bold text-right">Amallar</th>
          </tr>
        </thead>
        <tbody id="rooms-tbody" class="divide-y divide-slate-100 dark:divide-slate-800/60 text-sm font-medium">
          <!-- Rooms will render dynamically here -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modal Container Overlay for adding rooms -->
  <div id="room-modal-container"></div>
</div>
