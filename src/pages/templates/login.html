<div class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-[#070a11] py-12 px-4 sm:px-6 lg:px-8 transition-colors duration-500 relative overflow-hidden font-sans">
  <!-- Clinical/Medical aesthetic background nodes -->
  <div class="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-teal-500/[0.04] dark:bg-teal-550/[0.02] rounded-full -translate-x-1/2 -translate-y-1/2 blur-3xl"></div>
  <div class="absolute bottom-1/4 right-1/4 w-[500px] h-[500px] bg-emerald-500/[0.04] dark:bg-emerald-555/[0.02] rounded-full translate-x-1/2 translate-y-1/2 blur-3xl"></div>

  <!-- Clean clinical-styled frame -->
  <div class="max-w-md w-full space-y-8 bg-white dark:bg-[#0f1524] p-10 rounded-3xl shadow-xl border border-slate-200/70 dark:border-slate-800/80 relative z-10 animate-[zoomIn_0.4s_ease-out]">
    <div class="text-center">
      <!-- Real medical cross & shield emblem -->
      <div class="w-16 h-16 bg-gradient-to-br from-teal-500 to-teal-600 dark:from-teal-600 dark:to-teal-700 rounded-2xl flex items-center justify-center text-white mx-auto shadow-lg shadow-teal-500/20 dark:shadow-none mb-5.5 transition-transform hover:scale-105 duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="text-white"><path d="M19 14.5v-9l-7-3-7 3v9c0 5.5 7 8.5 7 8.5s7-3 7-8.5Z"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
      </div>
      <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight leading-none">Clinica Pro</h2>
      <p class="mt-2.5 text-teal-600 dark:text-teal-400 font-extrabold text-[10px] uppercase tracking-widest block font-mono">Integrallashgan Tibbiyot Tizimi</p>
    </div>

    <form id="login-form" class="space-y-6">
      <div id="login-error" class="hidden text-rose-600 dark:text-rose-400 bg-rose-50 dark:bg-rose-955/20 p-4 rounded-xl text-xs font-bold border border-rose-100 dark:border-rose-900/20 animate-shake"></div>
      
      <div class="space-y-4">
        <div class="space-y-1.5">
          <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 ml-0.5 font-sans">Email yoki Telefon raqami</label>
          <div class="relative group">
            <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 group-focus-within:text-teal-600 transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input id="email-address" name="email" type="text" required class="input-premium !pl-11" placeholder="admin@clinica.uz">
          </div>
        </div>
        
        <div class="space-y-1.5">
          <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 ml-0.5 font-sans">Maxfiy tahlillar paroli</label>
          <div class="relative group">
              <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 group-focus-within:text-teal-600 transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input id="password" name="password" type="password" required class="input-premium !pl-11" placeholder="••••••••">
          </div>
        </div>
      </div>

      <button id="login-btn" type="submit" class="btn-primary w-full !py-3.5 flex items-center justify-center">
        TIZIMGA KIRISH
      </button>
      
      <div class="pt-2 text-center border-t border-slate-100 dark:border-slate-800/50">
        <p class="text-[9px] text-slate-400 dark:text-slate-500 font-extrabold uppercase tracking-widest font-mono">Texnik yoki tibbiy yordam: +998 (71) 200-00-00</p>
      </div>
    </form>
  </div>
</div>
