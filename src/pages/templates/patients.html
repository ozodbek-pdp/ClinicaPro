<div class="flex flex-col gap-8 flex-1 opacity-0 translate-y-4 animate-[fadeInUp_0.5s_ease-out_forwards] pb-10">
  <!-- Header Controls -->
  <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 pb-2 border-b border-slate-100 dark:border-slate-800/80">
    <div class="flex items-center gap-4">
      <div class="w-1.5 h-10 bg-teal-600 rounded-full shadow-lg shadow-teal-500/50"></div>
      <div>
        <h1 class="text-3xl font-extrabold text-[#111827] dark:text-white tracking-tight leading-none">Bemorlar</h1>
        <p class="text-slate-500 dark:text-slate-400 font-semibold text-xs mt-1.5 uppercase tracking-wider font-mono">Markaziy karta ma'lumotlar bazasi</p>
      </div>
    </div>
    <div class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto">
      <div id="patient-tabs-container"></div>
      <div class="relative w-full sm:w-72 group">
        <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 group-focus-within:text-teal-600 transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" id="patient-search" placeholder="Ism, telefon yoki pochta..." class="input-premium input-icon-left" autocomplete="off" autocorrect="off" spellcheck="false">
      </div>
      <button id="add-patient-btn" class="btn-primary w-full sm:w-auto whitespace-nowrap cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" class="shrink-0"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        YANGI BEMOR QO'SHISH
      </button>
    </div>
  </header>

  <!-- Premium Patient Table -->
  <div class="card-premium overflow-hidden flex-1 flex flex-col group/table p-1.5">
    <div class="overflow-x-auto min-w-full inline-block align-middle rounded-2xl custom-scrollbar">
      <table class="min-w-full divide-y divide-slate-100 dark:divide-slate-800">
        <thead>
          <tr class="bg-slate-50/50 dark:bg-slate-900/30">
            <th class="p-5.5 text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest text-left font-mono">Bemor shaxsiyati</th>
            <th class="p-5.5 text-[10px] font-black text-slate-400 dark:text-slate-555 uppercase tracking-widest text-left hidden sm:table-cell font-mono">Davolash statusi</th>
            <th class="p-5.5 text-[10px] font-black text-slate-400 dark:text-slate-555 uppercase tracking-widest text-left hidden lg:table-cell font-mono">Aloqa ma'lumotlari</th>
            <th class="p-5.5 text-[10px] font-black text-slate-400 dark:text-slate-555 uppercase tracking-widest text-right font-mono">Amallar</th>
          </tr>
        </thead>
        <tbody id="patient-rows" class="divide-y divide-slate-50 dark:divide-slate-800/40 bg-white dark:bg-[#121826]">
          <!-- Patient rows will be injected dynamically -->
        </tbody>
      </table>
    </div>
  </div>
</div>
<div id="modal-container"></div>
